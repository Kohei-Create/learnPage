<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <link rel="icon" href="assets/images/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/css/todo.css">
    <title>TodoList</title>
</head>

<body>
    <div id="header"></div>
    <main>
        <div class="container">
            <h1 class="container-head">TODO</h1>
            <form id="form">
                <div class="form-container">
                    <div class="field">
                        <label for="input" class="form-label">TodoList</label>
                        <input type="text" class="input" name="text" id="input" placeholder="テキストを入力"
                            autocomplete="off">
                    </div>
                    <ul class="todo-list" id="list"></ul>
                </div>
            </form>
        </div>
    </main>
    <div id="footer"></div>
    <script src="assets/js/fetch.js"></script>
    <script src="assets/js/todo.js"></script>
</body>

</html>
